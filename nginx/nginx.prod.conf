events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile on;
    keepalive_timeout 65;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        text/javascript
        text/xml
        application/xml
        application/xml+rss
        image/svg+xml
        application/font-woff
        application/font-woff2;

    upstream backend {
        server backend:8080;
    }

    upstream frontend {
        server frontend:80;
    }

    upstream minio {
        server minio:9000;
    }

    # Cache for public-bucket objects served from MinIO.
    proxy_cache_path /var/cache/nginx/media levels=1:2 keys_zone=media_cache:10m
                     max_size=1g inactive=30d use_temp_path=off;

    server {
        listen 80;
        server_name _;

        # Cap request body to 150 MB so large .pptx uploads (<=100 MB) go through
        # with headroom for multipart overhead. Backend enforces the real limit.
        client_max_body_size 150m;

        # Static uploads served directly by Nginx (no Go hop)
        location /uploads/ {
            alias /app/uploads/;
            expires 30d;
            add_header Cache-Control "public";
            access_log off;
        }

        # Public-bucket CDN proxy to MinIO.
        # The backend builds URLs like /media/<bucket>/<key> via
        # S3_PUBLIC_BASE_URL=/media/<bucket>. Anonymous GET is allowed on the
        # public bucket (minio-init runs `mc anonymous set download`), so we
        # proxy straight through without signing.
        location /media/ {
            # Strip the /media/ prefix, forward the rest verbatim to MinIO.
            rewrite ^/media/(.*)$ /$1 break;
            proxy_pass http://minio;
            proxy_set_header Host $host;
            proxy_http_version 1.1;

            # Hide MinIO-internal headers from clients.
            proxy_hide_header x-amz-id-2;
            proxy_hide_header x-amz-request-id;
            proxy_hide_header x-amz-meta-server-side-encryption;
            proxy_hide_header x-amz-server-side-encryption;

            # Cache aggressively — slide images + question images are immutable
            # (UUID-keyed).
            proxy_cache media_cache;
            proxy_cache_valid 200 206 30d;
            proxy_cache_valid 404 1m;
            proxy_cache_revalidate on;
            proxy_cache_use_stale error timeout updating;

            expires 30d;
            add_header Cache-Control "public, immutable" always;
            add_header X-Cache-Status $upstream_cache_status always;
            access_log off;
        }

        # API proxy to Go backend
        location /api/ {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # WebSocket proxy to Go backend
        location /ws/ {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 3600s;
        }

        # Frontend static files (served by frontend nginx container)
        location / {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
