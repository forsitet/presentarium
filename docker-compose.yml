version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-presentarium}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
      POSTGRES_DB: ${DB_NAME:-presentarium}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-presentarium}"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    # `latest` because MinIO rotates dated RELEASE tags off Docker Hub and
    # old pins eventually 404. Pin to a specific date only if you need
    # strict reproducibility (and accept that you'll have to bump it
    # every few months).
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin-dev-only}
    volumes:
      - minio_data:/data
    ports:
      # Bind to loopback only — MinIO API and console must not be reachable
      # from outside the dev host.
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    healthcheck:
      test: ["CMD-SHELL", "mc ready local || curl -fsS http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # One-shot init container: creates buckets, opens anonymous read on the
  # public bucket, provisions a scoped service account for the backend.
  # Idempotent — safe to re-run.
  minio-init:
    # Same reasoning as the minio server image — dated tags get rotated.
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin-dev-only}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-presentarium}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-presentarium-dev-secret}
      S3_BUCKET_PUBLIC: ${S3_BUCKET_PUBLIC:-presentarium-public}
      S3_BUCKET_PRIVATE: ${S3_BUCKET_PRIVATE:-presentarium-private}
    entrypoint: /bin/sh
    command:
      - -c
      - |
        set -eu
        until mc alias set local http://minio:9000 "$$MINIO_ROOT_USER" "$$MINIO_ROOT_PASSWORD" >/dev/null 2>&1; do
          echo "waiting for minio..."
          sleep 1
        done
        mc mb -p local/"$$S3_BUCKET_PUBLIC"  2>/dev/null || true
        mc mb -p local/"$$S3_BUCKET_PRIVATE" 2>/dev/null || true
        mc anonymous set download local/"$$S3_BUCKET_PUBLIC"
        mc admin user svcacct add local "$$MINIO_ROOT_USER" \
          --access-key "$$S3_ACCESS_KEY_ID" \
          --secret-key "$$S3_SECRET_ACCESS_KEY" 2>/dev/null || echo "svc account already exists — ok"
        echo "minio-init: buckets ready, svc account ready"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      DB_HOST: postgres
      # Inside the compose network, backend reaches MinIO by service name.
      # The .env default (localhost:9000) targets the case where you run the
      # backend directly on the host, not inside docker.
      S3_ENDPOINT: http://minio:9000
      # Public URL participants hit from the browser — served by the MinIO
      # container via its host-bound port in dev.
      S3_PUBLIC_BASE_URL: http://localhost:9000/${S3_BUCKET_PUBLIC:-presentarium-public}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    volumes:
      - uploads:/app/uploads

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - backend

  nginx:
    image: nginx:1.25-alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - uploads:/app/uploads:ro
    depends_on:
      - backend
      - frontend

volumes:
  postgres_data:
  minio_data:
  uploads:
