services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-presentarium}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
      POSTGRES_DB: ${DB_NAME:-presentarium}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-presentarium}"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    # `latest` because MinIO rotates dated RELEASE tags off Docker Hub and
    # old pins eventually 404. Pin to a specific date only if you need
    # strict reproducibility (and accept that you'll have to bump it
    # every few months).
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    # Intentionally no "ports:" — MinIO is only reachable on the internal
    # docker network. nginx proxies public GETs to the public bucket under
    # /media/<bucket>/... with 30-day caching (see nginx/nginx.prod.conf).
    healthcheck:
      test: ["CMD-SHELL", "mc ready local || curl -fsS http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  minio-init:
    # Same reasoning as the minio server image — dated tags get rotated.
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY}
      S3_BUCKET_PUBLIC: ${S3_BUCKET_PUBLIC:-presentarium-public}
      S3_BUCKET_PRIVATE: ${S3_BUCKET_PRIVATE:-presentarium-private}
    entrypoint: /bin/sh
    command:
      - -c
      - |
        set -eu
        until mc alias set local http://minio:9000 "$$MINIO_ROOT_USER" "$$MINIO_ROOT_PASSWORD" >/dev/null 2>&1; do
          echo "waiting for minio..."
          sleep 1
        done
        mc mb -p local/"$$S3_BUCKET_PUBLIC"  2>/dev/null || true
        mc mb -p local/"$$S3_BUCKET_PRIVATE" 2>/dev/null || true
        mc anonymous set download local/"$$S3_BUCKET_PUBLIC"
        mc admin user svcacct add local "$$MINIO_ROOT_USER" \
          --access-key "$$S3_ACCESS_KEY_ID" \
          --secret-key "$$S3_SECRET_ACCESS_KEY" 2>/dev/null || echo "svc account already exists — ok"
        echo "minio-init: buckets ready, svc account ready"

  backend:
    image: ghcr.io/${GHCR_USER}/presentarium-backend:latest
    restart: unless-stopped
    env_file: .env
    environment:
      DB_HOST: postgres
      # Internal (docker-network) endpoint used for PUT/signing.
      S3_ENDPOINT: http://minio:9000
      # Public URL prefix that clients use to fetch objects. nginx proxies
      # /media/<bucket>/<key> -> http://minio:9000/<bucket>/<key>. This makes
      # uploaded images reachable from participant browsers without exposing
      # MinIO directly to the internet.
      S3_PUBLIC_BASE_URL: /media/${S3_BUCKET_PUBLIC:-presentarium-public}
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    volumes:
      - uploads:/app/uploads
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    image: ghcr.io/${GHCR_USER}/presentarium-frontend:latest
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

  nginx:
    image: nginx:1.25-alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/nginx.conf:ro
      - uploads:/app/uploads:ro
      - nginx_cache:/var/cache/nginx
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  postgres_data:
  minio_data:
  uploads:
  nginx_cache:
